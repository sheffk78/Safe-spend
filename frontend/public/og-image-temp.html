<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Safe-Spend OG Image</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #fafaf8;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  /* Subtle node network texture (from spending approval canvas) */
  .nodes-overlay {
    position: absolute; inset: 0;
    opacity: 0.06;
    background-image:
      radial-gradient(circle at 20% 30%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 40% 60%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 60% 20%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 80% 50%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 15% 70%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 55% 80%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 75% 25%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 35% 15%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 90% 75%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 10% 45%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 45% 40%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 70% 65%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 25% 85%, #10B981 2px, transparent 2px),
      radial-gradient(circle at 85% 10%, #10B981 1.5px, transparent 1.5px),
      radial-gradient(circle at 50% 55%, #10B981 2px, transparent 2px);
    background-size: 100% 100%;
    pointer-events: none;
  }
  /* Connection lines between nodes - very subtle */
  .connections {
    position: absolute; inset: 0;
    opacity: 0.04;
    background:
      linear-gradient(25deg, transparent 48%, #10B981 49%, #10B981 51%, transparent 52%),
      linear-gradient(-35deg, transparent 48%, #10B981 49%, #10B981 51%, transparent 52%),
      linear-gradient(60deg, transparent 48%, #10B981 49%, #10B981 51%, transparent 52%),
      linear-gradient(-15deg, transparent 48%, #10B981 49%, #10B981 51%, transparent 52%),
      linear-gradient(45deg, transparent 48%, #10B981 49%, #10B981 51%, transparent 52%);
    background-size: 300px 300px, 400px 350px, 250px 280px, 350px 300px, 320px 320px;
    background-position: 0 0, 150px 100px, 80px 200px, 200px 50px, 100px 150px;
    pointer-events: none;
  }
  /* Noise texture */
  .noise {
    position: absolute; inset: 0;
    opacity: 0.015;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    pointer-events: none;
  }
  /* Top accent line */
  .top-line {
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: #10B981;
    opacity: 0.5;
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
  }
  .logo {
    margin-bottom: 36px;
  }
  .logo svg {
    width: 120px; height: 120px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 66px;
    letter-spacing: -0.02em;
    color: #0F0F11;
    margin-bottom: 20px;
    line-height: 1.05;
  }
  h1 .hyphen {
    color: #10B981;
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 20px;
    letter-spacing: 0.06em;
    color: rgba(15,15,17,0.5);
    text-transform: uppercase;
  }
  .byline {
    position: absolute;
    bottom: 36px; right: 48px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: rgba(15,15,17,0.35);
    letter-spacing: 0.08em;
  }
  .byline span {
    color: rgba(15,15,17,0.55);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="nodes-overlay"></div>
  <div class="connections"></div>
  <div class="noise"></div>
  <div class="top-line"></div>

  <div class="content">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120">
        <defs>
          <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M50 6 L90 22 L90 54 C90 78 73 94 50 102 C27 94 10 78 10 54 L10 22 Z" fill="url(#sg)" opacity="0.12" stroke="url(#sg)" stroke-width="2.5"/>
        <path d="M50 16 L80 28 L80 52 C80 71 68 84 50 90 C32 84 20 71 20 52 L20 28 Z" fill="none" stroke="#10B981" stroke-width="1.2" opacity="0.3"/>
        <line x1="50" y1="30" x2="50" y2="76" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
        <path d="M62 40 C62 33 56 28 50 28 C44 28 38 33 38 40 C38 47 44 49 50 51" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
        <path d="M38 62 C38 69 44 74 50 74 C56 74 62 69 62 62 C62 55 56 53 50 51" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
        <g opacity="0.5">
          <line x1="72" y1="44" x2="86" y2="44" stroke="#10B981" stroke-width="1.8" stroke-linecap="round"/>
          <polyline points="83,41 86,44 83,47" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
        <g opacity="0.3">
          <line x1="76" y1="56" x2="90" y2="56" stroke="#10B981" stroke-width="1.8" stroke-linecap="round"/>
          <polyline points="87,53 90,56 87,59" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </svg>
    </div>
    <h1>Safe<span class="hyphen">-</span>Spend</h1>
    <p class="tagline">Spending Governance for AI Agents</p>
  </div>

  <div class="byline">by <span>AgenticTrust</span></div>
</body>
</html>

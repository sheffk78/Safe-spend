server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent caching of health endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        return 200 "healthy\n";
    }

    # Proxy API requests to the backend
    # In production with VITE_BACKEND_URL set, the frontend JS calls the API directly (CORS)
    # This block is a fallback for same-origin API calls
    location /api/ {
        proxy_pass http://backend.railway.internal:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve static assets with caching
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Serve specific static files directly (robots.txt, sitemap.xml, llms.txt)
    location /robots.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /sitemap.xml {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location /llms.txt {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback - everything else goes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
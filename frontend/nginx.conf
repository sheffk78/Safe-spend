server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets (Vite outputs to /assets/, CRA used /static/)
    location ~* ^/(assets|static)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # AI visibility files - serve as plain text
    location = /llms.txt {
        alias /usr/share/nginx/html/.well-known/llms.txt;
        default_type text/plain;
        add_header Content-Type text/plain;
    }

    location = /llms-full.txt {
        alias /usr/share/nginx/html/.well-known/llms-full.txt;
        default_type text/plain;
        add_header Content-Type text/plain;
    }

    location = /robots.txt {
        alias /usr/share/nginx/html/robots.txt;
        default_type text/plain;
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        alias /usr/share/nginx/html/sitemap.xml;
        default_type application/xml;
        add_header Content-Type application/xml;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

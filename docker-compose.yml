# Safe-Spend Docker Compose
# For local development and self-hosted deployment

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: safespend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safespend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safespend_secret}
      POSTGRES_DB: ${POSTGRES_DB:-safespend}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-safespend}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safespend-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: postgresql://${POSTGRES_USER:-safespend}:${POSTGRES_PASSWORD:-safespend_secret}@postgres:5432/${POSTGRES_DB:-safespend}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}
      SENDER_EMAIL: ${SENDER_EMAIL:-no-reply@yourdomain.com}
      ALERT_EMAIL: ${ALERT_EMAIL:-alerts@yourdomain.com}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: safespend-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  default:
    name: safespend-network
